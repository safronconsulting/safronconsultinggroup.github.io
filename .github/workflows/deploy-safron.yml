name: Deploy Safron to GitHub Pages

on:
  push:
    branches: [main]
    paths:
      - "artifacts/safron/**"
      - "lib/**"
      - "pnpm-workspace.yaml"
      - "pnpm-lock.yaml"
      - ".github/workflows/deploy-safron.yml"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build Safron for GitHub Pages
        working-directory: artifacts/safron
        env:
          BASE_PATH: /${{ github.event.repository.name }}/
          PORT: "3000"
        run: pnpm run build

      - name: Add SPA 404 fallback
        run: cp artifacts/safron/dist/public/index.html artifacts/safron/dist/public/404.html

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: artifacts/safron/dist/public

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
